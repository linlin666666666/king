<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera Particles — 你即是光</title>
<style>
:root{--gold:#b8924e;--cream:#e0d5c0}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:"PingFang SC","Microsoft YaHei",sans-serif}

/* Full screen mirrored camera */
#videoBg{position:fixed;inset:0;z-index:0;object-fit:cover;transform:scaleX(-1);width:100vw;height:100vh;min-width:100vw;min-height:100vh}
#darkVeil{position:fixed;inset:0;z-index:1;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.35) 100%)}

/* Particles on top */
#particleCanvas{position:fixed;inset:0;z-index:2;pointer-events:none}
#motionCanvas{position:fixed;top:0;left:0;width:160px;height:120px;opacity:0;pointer-events:none;z-index:-1}

/* UI */
#ui{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:14px;align-items:center;pointer-events:auto}
button{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);color:#fff;padding:10px 20px;border-radius:24px;cursor:pointer;font-size:13px;letter-spacing:1px;backdrop-filter:blur(12px);transition:all .4s;pointer-events:auto}
button:hover{background:rgba(184,146,78,.2);border-color:var(--gold);color:var(--gold)}
button.active{background:rgba(184,146,78,.25);border-color:var(--gold);color:var(--gold)}
#status{color:rgba(255,255,255,.5);font-size:10px;letter-spacing:1px;text-shadow:0 0 8px rgba(0,0,0,.8)}
#prompt{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;color:#fff;font-size:16px;letter-spacing:3px;opacity:.8;transition:opacity .8s;pointer-events:none;text-shadow:0 0 20px rgba(0,0,0,.8)}
.hidden{opacity:0!important}

/* Mode indicator */
#modeName{position:fixed;top:40px;left:50%;transform:translateX(-50%);z-index:10;color:#fff;font-size:28px;letter-spacing:6px;pointer-events:none;text-shadow:0 0 30px rgba(0,0,0,.8);transition:all .6s;opacity:.6}
</style>
</head>
<body>
<video id="videoBg" autoplay playsinline muted></video>
<div id="darkVeil"></div>
<canvas id="motionCanvas"></canvas>
<canvas id="particleCanvas"></canvas>
<div id="prompt">点击屏幕 · 开启摄像头</div>
<div id="modeName"></div>
<div id="ui">
  <button id="btnCamera">📷</button>
  <button id="btnMode">🎨 切换模式</button>
  <span id="status"></span>
</div>

<script>
const video=document.getElementById('videoBg');
const motionCanvas=document.getElementById('motionCanvas');
const motionCtx=motionCanvas.getContext('2d',{willReadFrequently:true});
const pCanvas=document.getElementById('particleCanvas');
const pCtx=pCanvas.getContext('2d');
const prompt=document.getElementById('prompt');
const statusEl=document.getElementById('status');
const modeName=document.getElementById('modeName');

const modes=[
  {name:'流光追随',id:'trail'},
  {name:'爆裂排斥',id:'explode'},
  {name:'星环环绕',id:'orbit'},
  {name:'风场流动',id:'flow'}
];
let modeIdx=0,cameraActive=false;
let prevFrame=null,motionMap=[];
const MW=160,MH=120;
motionCanvas.width=MW;motionCanvas.height=MH;

function resize(){
  pCanvas.width=window.innerWidth;
  pCanvas.height=window.innerHeight;
}
resize();window.addEventListener('resize',resize);

// Camera
async function startCamera(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:1280,height:720,facingMode:'user'}});
    video.srcObject=stream;
    await video.play();
    cameraActive=true;
    prompt.classList.add('hidden');
    document.getElementById('btnCamera').classList.add('active');
    document.getElementById('btnCamera').textContent='📷 ON';
    showModeName();
  }catch(e){
    statusEl.textContent='需要摄像头权限';
    prompt.textContent='请在浏览器设置中允许摄像头权限后刷新';
    prompt.classList.remove('hidden');
  }
}
function stopCamera(){
  if(video.srcObject){video.srcObject.getTracks().forEach(t=>t.stop());video.srcObject=null}
  cameraActive=false;prevFrame=null;motionMap=[];
  document.getElementById('btnCamera').classList.remove('active');
  document.getElementById('btnCamera').textContent='📷';
  modeName.style.opacity='0';
}

function showModeName(){
  modeName.textContent=modes[modeIdx].name;
  modeName.style.opacity='.7';
  setTimeout(()=>modeName.style.opacity='.15',2000);
}

// Motion detection
function detectMotion(){
  if(!cameraActive||video.readyState<2)return;
  motionCtx.drawImage(video,0,0,MW,MH);
  const current=motionCtx.getImageData(0,0,MW,MH);
  if(!prevFrame){prevFrame=current;return}
  motionMap=new Float32Array(MW*MH);
  let totalMotion=0;
  for(let i=0;i<current.data.length;i+=4){
    const r=Math.abs(current.data[i]-prevFrame.data[i]);
    const g=Math.abs(current.data[i+1]-prevFrame.data[i+1]);
    const b=Math.abs(current.data[i+2]-prevFrame.data[i+2]);
    const m=(r+g+b)/3/255;
    motionMap[i/4]=m;
    totalMotion+=m;
  }
  prevFrame=current;
  const pct=(totalMotion/(MW*MH)*100).toFixed(1);
  statusEl.textContent=`运动 ${pct}%  |  ${modes[modeIdx].name}`;
}

// Particles
class Particle{
  constructor(){this.reset(true)}
  reset(init){
    this.x=Math.random()*pCanvas.width;
    this.y=Math.random()*pCanvas.height;
    this.vx=0;this.vy=0;
    this.size=Math.random()*2+.3;
    this.baseSize=this.size;
    this.alpha=Math.random()*.5+.3;
    if(init)this.life=Math.random();
  }
  update(mx,my){
    const gx=Math.floor(this.x/pCanvas.width*MW);
    const gy=Math.floor(this.y/pCanvas.height*MH);
    const idx=Math.min(MW*MH-1,Math.max(0,gy*MW+gx));
    const motion=motionMap[idx]||0;

    this.vx*=.95;this.vy*=.95;

    switch(modes[modeIdx].id){
      case'trail':
        if(motion>.08){this.vx+=(mx-this.x)*.0004;this.vy+=(my-this.y)*.0004}
        this.size=this.baseSize*(1+motion*6);
        this.alpha=.3+motion*2;
        break;
      case'explode':
        if(motion>.12){const dx=this.x-mx,dy=this.y-my,dist=Math.sqrt(dx*dx+dy*dy)+.1;const f=(.6*motion)/dist;this.vx+=dx*f;this.vy+=dy*f;this.size=this.baseSize*(1+motion*10)}
        this.alpha=.3+motion*1.5;
        break;
      case'orbit':
        if(motion>.15){const dx=this.x-mx,dy=this.y-my,dist=Math.sqrt(dx*dx+dy*dy)+.1;this.vx+=-dy/dist*.025;this.vy+=dx/dist*.025}
        this.size=this.baseSize*(1+motion*4);
        this.alpha=.3+motion;
        break;
      case'flow':
        if(motion>.08){this.vx+=(Math.random()-.5)*motion*.6;this.vy+=motion*.4}
        this.size=this.baseSize*(1+motion*5);
        this.alpha=.3+motion*1.5;
        break;
    }

    if(!cameraActive){
      const dx=this.x-mx,dy=this.y-my,dist=Math.sqrt(dx*dx+dy*dy)+1;
      if(dist<200){this.vx+=dx/dist*.3;this.vy+=dy/dist*.3;this.size=Math.min(5,this.size+.1)}
    }

    this.alpha=Math.max(.15,Math.min(.9,this.alpha));
    this.size=Math.max(.3,Math.min(8,this.size));
    this.x+=this.vx;this.y+=this.vy;
    if(this.x<0)this.x=pCanvas.width;if(this.x>pCanvas.width)this.x=0;
    if(this.y<0)this.y=pCanvas.height;if(this.y>pCanvas.height)this.y=0;
    this.life+=.0015;if(this.life>1)this.reset(false);
  }
  draw(){
    pCtx.beginPath();
    pCtx.arc(this.x,this.y,this.size,0,Math.PI*2);
    pCtx.fillStyle=`rgba(220,180,100,${this.alpha})`;
    pCtx.fill();
    if(this.size>1.5){
      pCtx.beginPath();
      pCtx.arc(this.x,this.y,this.size*3,0,Math.PI*2);
      pCtx.fillStyle=`rgba(220,200,140,${this.alpha*.1})`;
      pCtx.fill();
    }
  }
}

const particles=Array.from({length:250},()=>new Particle(true));
let mouseX=pCanvas.width/2,mouseY=pCanvas.height/2;

document.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY});
document.addEventListener('touchmove',e=>{mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY},{passive:true});

function draw(){
  // Clear with very light trail so camera stays visible
  pCtx.fillStyle='rgba(0,0,0,.04)';
  pCtx.fillRect(0,0,pCanvas.width,pCanvas.height);
  detectMotion();
  particles.forEach(p=>{p.update(mouseX,mouseY);p.draw()});
  requestAnimationFrame(draw);
}
draw();

// UI
document.getElementById('btnCamera').addEventListener('click',e=>{e.stopPropagation();cameraActive?stopCamera():startCamera()});
document.getElementById('btnMode').addEventListener('click',e=>{e.stopPropagation();modeIdx=(modeIdx+1)%modes.length;showModeName()});
document.addEventListener('click',()=>{if(!cameraActive)startCamera()},{once:true});
</script>
</body>
</html>
